name: Deploy to EC2

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            # Kill ALL existing instances (processes + screens)
            sudo fuser -k 8000/tcp 2>/dev/null || true
            sudo fuser -k 5000/tcp 2>/dev/null || true
            sudo pkill -9 -f "python.*api_server" 2>/dev/null || true
            sudo pkill -9 -f "python.*telegram_bot/bot" 2>/dev/null || true
            sudo pkill -9 -f "mlflow ui" 2>/dev/null || true
            sudo screen -wipe 2>/dev/null || true
            sleep 3
            # Run deploy as root so screens are accessible to root user
            sudo bash << 'DEPLOY'
            cd /home/ubuntu/graduation_final
            git pull
            source venv/bin/activate
            pip install -r requirements.txt
            screen -dmS api bash -c "cd /home/ubuntu/graduation_final && source venv/bin/activate && python api_server.py"
            screen -dmS bot bash -c "cd /home/ubuntu/graduation_final && source venv/bin/activate && python telegram_bot/bot.py"
            screen -dmS mlflow bash -c "cd /home/ubuntu/graduation_final && source venv/bin/activate && mlflow ui --host 0.0.0.0 --port 5000 --allowed-hosts '*' --cors-allowed-origins '*'"
            echo "Deploy complete."
            DEPLOY

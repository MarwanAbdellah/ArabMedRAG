name: arabic_chatbot
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
    # CrewAI framework
    - crewai>=0.80.0
    - crewai-tools>=0.14.0
    # Retrieval
    - faiss-cpu>=1.7.4
    - rank-bm25>=0.2.2
    # Embeddings & NLP
    - sentence-transformers>=2.2.0
    - torch>=2.1.0
    - sentencepiece>=0.1.99
    - protobuf>=3.20.0
    # Language detection
    - langdetect>=1.0.9
    # ML / Data
    - scikit-learn>=1.3.0
    - pandas>=2.0.0
    - numpy>=1.24.0
    # Tokenization
    - tiktoken>=0.5.0
    # Config / Env
    - python-dotenv>=1.0.0
    - pyyaml>=6.0
    # UI
    - streamlit>=1.32.0
    # Ollama Python client (optional)
    - ollama>=0.1.7
    # LiteLLM (used by CrewAI internally)
    - litellm>=1.30.0
